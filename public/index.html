<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>社区法治生态智能预警与靶向普控系统</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body class="bg-slate-50 text-slate-900 leading-relaxed">
    <div class="min-h-screen flex flex-col">
      <header class="bg-white shadow-sm">
        <div class="mx-auto max-w-7xl px-6 py-8">
          <div class="text-slate-900">
            <h1 class="text-3xl font-semibold">基于风险感知的社区法治生态智能预警与靶向普控系统</h1>
            <p class="mt-4 max-w-3xl text-slate-600 sm:text-base">
              本系统服务检察院法律监督，提升基层治理精准性，强化风险预警能力，支持治理闭环。
            </p>
          </div>
        </div>
      </header>

      <main class="flex-1 mx-auto w-full max-w-7xl px-6 py-8">
        <div class="grid gap-8 xl:grid-cols-[1.2fr_0.8fr]">
          <section class="space-y-6">
            <div class="rounded-3xl border border-slate-200 bg-white p-6 shadow-sm">
              <div class="flex flex-wrap items-center justify-between gap-4">
                <div>
                  <p class="text-sm text-slate-500">社区名称：<span id="communityName" class="font-semibold text-slate-800"></span></p>
                  <p class="mt-2 text-sm text-slate-500">风险类型：<span id="riskTypes" class="font-semibold text-slate-800"></span></p>
                </div>
                <div class="flex flex-wrap items-center gap-2">
                  <span class="rounded-full bg-red-100 px-3 py-1 text-sm font-medium text-red-700">高风险</span>
                  <span class="rounded-full bg-orange-100 px-3 py-1 text-sm font-medium text-orange-700">中风险</span>
                  <span class="rounded-full bg-sky-100 px-3 py-1 text-sm font-medium text-sky-700">低风险</span>
                </div>
              </div>

              <div class="mt-6 space-y-5">
                <div class="rounded-3xl bg-slate-50 p-5">
                  <h2 class="text-lg font-semibold text-slate-900">治理建议</h2>
                  <p id="pushGovernance" class="mt-3 text-slate-700 whitespace-pre-line"></p>
                </div>
                <div class="rounded-3xl bg-slate-50 p-5">
                  <h2 class="text-lg font-semibold text-slate-900">普法内容</h2>
                  <p id="pushLaw" class="mt-3 text-slate-700 whitespace-pre-line"></p>
                </div>
                <div class="rounded-3xl bg-slate-50 p-5">
                  <h2 class="text-lg font-semibold text-slate-900">处置要求</h2>
                  <p id="pushAction" class="mt-3 text-slate-700 whitespace-pre-line"></p>
                </div>
              </div>

              <div class="mt-6 flex flex-col gap-3 sm:flex-row sm:items-center">
                <button id="refreshPush" class="inline-flex items-center justify-center rounded-2xl bg-sky-600 px-5 py-3 text-sm font-semibold text-white shadow-sm transition hover:bg-sky-700">刷新推送</button>
                <button id="markHandled" class="inline-flex items-center justify-center rounded-2xl border border-slate-300 bg-white px-5 py-3 text-sm font-semibold text-slate-800 transition hover:bg-slate-50">已处置</button>
                <span id="feedbackStatus" class="text-sm text-slate-500"></span>
              </div>
            </div>

            <div class="rounded-3xl border border-slate-200 bg-white p-6 shadow-sm">
              <h2 class="text-xl font-semibold text-slate-900">风险画像概览</h2>
              <div class="mt-4 grid gap-4 sm:grid-cols-2">
                <div class="rounded-2xl bg-slate-50 p-4">
                  <p class="text-sm text-slate-500">社区摘要</p>
                  <p id="riskSummary" class="mt-2 text-slate-700"></p>
                </div>
                <div class="rounded-2xl bg-slate-50 p-4">
                  <p class="text-sm text-slate-500">关键指标</p>
                  <ul id="riskIndicators" class="mt-2 space-y-2 text-slate-700"></ul>
                </div>
              </div>
            </div>
          </section>

          <section class="rounded-3xl border border-slate-200 bg-white p-6 shadow-sm">
            <div class="flex items-center justify-between gap-4">
              <div>
                <h2 class="text-xl font-semibold text-slate-900">法治治理AI助手</h2>
                <p class="mt-2 text-sm text-slate-500">直接提问，获取基于风险背景的治理与普法建议。</p>
              </div>
              <span class="rounded-full bg-slate-100 px-3 py-1 text-sm text-slate-700">在线</span>
            </div>

            <div id="chatWindow" class="mt-6 flex h-[450px] flex-col gap-4 overflow-y-auto rounded-3xl bg-slate-50 p-5">
              <div class="text-sm text-slate-500">聊天记录将显示在此处。</div>
            </div>

            <form id="chatForm" class="mt-6 flex flex-col gap-3 sm:flex-row">
              <input id="chatInput" type="text" placeholder="请输入问题，例如：当前应重点开展哪些普法活动？" class="flex-1 rounded-2xl border border-slate-300 bg-white px-4 py-3 text-slate-900 outline-none focus:border-sky-500 focus:ring-2 focus:ring-sky-100" />
              <button type="submit" class="rounded-2xl bg-sky-600 px-5 py-3 text-sm font-semibold text-white transition hover:bg-sky-700">发送</button>
            </form>
          </section>
        </div>
      </main>

      <footer class="border-t border-slate-200 bg-slate-100 py-5">
        <div class="mx-auto max-w-7xl px-6 text-sm text-slate-600">
          本系统已实现“数据融合→风险画像→靶向治理→效果评估”全流程闭环，符合西城区检察院社区法治治理智能化建设要求。
        </div>
      </footer>
    </div>
    <script src="app.js"></script>
  </body>
</html>
