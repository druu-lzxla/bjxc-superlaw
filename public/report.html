<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>个性化报告 - 云鉴治微</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body style="background-color: var(--color-paper);">
    <div class="min-h-screen flex flex-col">
      <header style="background-color: white; border-bottom: 3px solid var(--color-primary);">
        <div class="mx-auto max-w-7xl px-6 py-8">
          <div class="flex items-center justify-between">
            <div class="flex items-center gap-4">
              <img src="images/logo.svg" alt="Logo" class="h-12 w-auto" onerror="this.style.display='none'" />
              <h1 style="font-family: var(--font-title); font-size: 1.875rem; font-weight: 900; color: var(--color-primary);">云鉴治微</h1>
            </div>
            <div class="flex items-center gap-4">
              <span id="userDisplay" style="font-size: 0.875rem; color: var(--color-slate-600);">
              <button id="logoutBtn" style="background-color: transparent; color: var(--color-primary); padding: 0.5rem 1rem; border: 2px solid var(--color-primary); border-radius: 0.5rem; font-size: 0.875rem;">退出登录</button>
            </div>
          </div>
        </div>
      </header>

      <main class="flex-1 mx-auto w-full max-w-7xl px-6 py-8">
        <div style="margin-bottom: 1.5rem; display: flex; align-items: center; justify-content: space-between;">
          <h2 style="font-family: var(--font-title); font-size: 1.5rem; font-weight: 700; color: var(--color-primary);">个性化治理报告</h2>
          <button id="generateReportBtn" style="background-color: var(--color-primary); color: white; padding: 0.75rem 1.5rem; border-radius: 0.5rem; font-weight: 500;">生成新报告</button>
        </div>

        <div id="reportContent" style="display: flex; flex-direction: column; gap: 1.5rem;">
          <!-- 报告内容将通过JS动态加载 -->
          <div style="background-color: white; border: 1px solid var(--color-slate-200); border-radius: 1rem; padding: 1.5rem; box-shadow: var(--shadow-md);">
            <div style="display: flex; flex-direction: column; gap: 1rem; animation: pulse 2s infinite;">
              <div style="height: 1.5rem; width: 33%; background-color: var(--color-slate-200); border-radius: 0.25rem;"></div>
              <div style="height: 1rem; width: 100%; background-color: var(--color-slate-200); border-radius: 0.25rem;"></div>
              <div style="height: 1rem; width: 66%; background-color: var(--color-slate-200); border-radius: 0.25rem;"></div>
            </div>
          </div>
        </div>
      </main>

      <footer style="border-top: 2px solid var(--color-slate-200); background-color: var(--color-slate-100); padding: 1.25rem 0;">
        <div style="text-align: center; font-size: 0.875rem; color: var(--color-slate-600);">
          本系统已实现"数据融合→风险画像→靶向治理→效果评估"全流程闭环。
        </div>
      </footer>
    </div>

    <script>
      // 检查登录状态
      const userData = localStorage.getItem('user');
      if (!userData) {
        window.location.href = 'login.html';
      } else {
        const user = JSON.parse(userData);
        document.getElementById('userDisplay').textContent = `欢迎，${user.username}`;
      }

      // 退出登录
      document.getElementById('logoutBtn').addEventListener('click', function() {
        localStorage.removeItem('user');
        window.location.href = 'login.html';
      });

      // 加载个性化报告
      async function loadPersonalizedReport() {
        const reportContent = document.getElementById('reportContent');
        
        try {
          const response = await fetch('/api/personalized-report', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
              username: JSON.parse(localStorage.getItem('user')).username
            })
          });
          const data = await response.json();
          
          if (data.report) {
            renderReport(data.report);
          } else {
            reportContent.innerHTML = '<p class="text-slate-600">暂无报告数据，请先登录并使用系统。</p>';
          }
        } catch (error) {
          console.error('加载报告失败：', error);
          reportContent.innerHTML = '<p class="text-red-600">报告加载失败，请稍后重试。</p>';
        }
      }

      // 渲染报告
      function renderReport(report) {
        const reportContent = document.getElementById('reportContent');
        
        let html = `
          <div class="rounded-3xl border border-slate-200 bg-white p-6 shadow-sm">
            <h3 class="text-xl font-semibold text-slate-900 mb-4">${report.title || '个性化治理报告'}</h3>
            <p class="text-slate-600 whitespace-pre-line">${report.content}</p>
            <div class="mt-4 text-sm text-slate-500">
              生成时间：${report.generatedAt || new Date().toLocaleString()}
            </div>
          </div>
        `;
        
        if (report.sections) {
          report.sections.forEach(section => {
            html += `
              <div class="rounded-3xl border border-slate-200 bg-white p-6 shadow-sm">
                <h3 class="text-xl font-semibold text-slate-900 mb-4">${section.title}</h3>
                <p class="text-slate-600 whitespace-pre-line">${section.content}</p>
              </div>
            `;
          });
        }
        
        reportContent.innerHTML = html;
      }

      // 生成新报告
      document.getElementById('generateReportBtn').addEventListener('click', async function() {
        const btn = this;
        btn.disabled = true;
        btn.textContent = '生成中...';
        
        try {
          const response = await fetch('/api/generate-report', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
              username: JSON.parse(localStorage.getItem('user')).username
            })
          });
          const data = await response.json();
          
          if (data.report) {
            renderReport(data.report);
            // 保存到本地
            localStorage.setItem('personalizedReport', JSON.stringify(data.report));
          }
        } catch (error) {
          console.error('生成报告失败：', error);
          alert('报告生成失败，请稍后重试。');
        } finally {
          btn.disabled = false;
          btn.textContent = '生成新报告';
        }
      });

      // 初始化
      loadPersonalizedReport();
    </script>
  </body>
</html>
